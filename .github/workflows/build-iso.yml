name: Build ISO

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'latest'
  release:
    types: [published]

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: noctis-caeruleae

jobs:
  build-iso:
    name: Build Installation ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Install BlueBuild CLI
        run: |
          docker run --pull always --rm ghcr.io/blue-build/cli:latest-installer | bash
          bluebuild --version

      - name: Generate ISO from published image
        run: |
          sudo bluebuild generate-iso \
            --iso-name noctis-caeruleae-${{ steps.version.outputs.version }}.iso \
            image ghcr.io/jvzr/noctis-caeruleae:latest

      - name: Get ISO filename
        id: iso
        run: |
          ISO_FILE=$(ls *.iso | head -1)
          echo "filename=$ISO_FILE" >> $GITHUB_OUTPUT
          echo "Found ISO: $ISO_FILE"

      - name: Generate checksums
        run: |
          sha256sum *.iso > noctis-caeruleae-${{ steps.version.outputs.version }}.iso.sha256sum
          cat noctis-caeruleae-${{ steps.version.outputs.version }}.iso.sha256sum

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: noctis-caeruleae-iso-${{ steps.version.outputs.version }}
          path: |
            *.iso
            *.sha256sum
          retention-days: 30

      - name: Upload ISO to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.iso
            *.sha256sum
          body: |
            ## Noctis Caeruleae ISO - ${{ steps.version.outputs.version }}

            **Installation ISO** for fresh installs.

            ### Download and Verify

            ```bash
            # Download ISO and checksum
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/${{ steps.iso.outputs.filename }}
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/noctis-caeruleae-${{ steps.version.outputs.version }}.iso.sha256sum

            # Verify checksum
            sha256sum -c noctis-caeruleae-${{ steps.version.outputs.version }}.iso.sha256sum
            ```

            ### Create Bootable USB

            **Linux:**
            ```bash
            sudo dd if=${{ steps.iso.outputs.filename }} of=/dev/sdX bs=4M status=progress && sync
            ```

            **Windows:** Use [Rufus](https://rufus.ie/) or [Fedora Media Writer](https://getfedora.org/en/workstation/download/)

            **macOS:** Use [balenaEtcher](https://www.balena.io/etcher/)

            ### After Installation

            Apply your dotfiles:
            ```bash
            chezmoi init --apply https://github.com/${{ github.repository_owner }}/noctis-caeruleae-dotfiles.git
            ```

      - name: Summary
        if: always()
        run: |
          echo "### ISO Build Summary :cd:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ISO File**: \`${{ steps.iso.outputs.filename }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: \`$(du -h *.iso | cut -f1)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Checksum:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat *.sha256sum >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
